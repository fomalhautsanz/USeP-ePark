<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ePark Guard – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --maroon: #6B0F1A;
      --maroon-dark: #4A0A12;
      --maroon-light: #8B1A28;
      --gold: #B8962E;
      --gold-light: #D4AF50;
      --cream: #F5EFE0;
      --cream-input: #F0E8D8;
      --text-dark: #2C1810;
      --text-muted: #7A6A5A;
      --white: #FFFFFF;
    }

    body {
      min-height: 100vh;
      background-color: var(--maroon);
      background-image:
        radial-gradient(ellipse at 20% 80%, rgba(180,20,40,0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(100,10,20,0.6) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow', sans-serif;
      padding: 2rem 1rem;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
      gap: 0.75rem;
    }

    .brand-icon {
      width: 80px;
      height: 80px;
      background: var(--gold);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--maroon-dark);
      letter-spacing: 1px;
    }

    .brand-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .brand-sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .badge {
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 18px;
      border-radius: 20px;
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .field input {
      width: 100%;
      background: var(--cream-input);
      border: none;
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      color: var(--text-dark);
      outline: none;
      transition: box-shadow 0.2s;
    }

    .field input::placeholder { color: #B8A898; }
    .field input:focus { box-shadow: 0 0 0 2.5px var(--gold); }

    .error-msg {
      display: none;
      background: #fdecea;
      border-left: 3px solid #e53935;
      color: #b71c1c;
      font-size: 0.82rem;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 1.25rem;
    }
    .error-msg.show { display: block; }

    .btn-signin {
      width: 100%;
      background: var(--maroon);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }
    .btn-signin:hover { background: var(--maroon-light); }
    .btn-signin:active { transform: scale(0.98); }
    .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-signin svg { width: 18px; height: 18px; }

    .footer-text {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-signin.loading .spinner { display: block; }
    .btn-signin.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="brand">
    <div class="brand-icon">EP</div>
    <div class="brand-title">ePark Guard</div>
    <div class="brand-sub">USeP Tagum Campus</div>
    <div class="badge">Guard Access</div>
  </div>

  <div class="card">
    <div class="field">
      <label>Guard ID / Username</label>
      <input type="text" id="username" placeholder="Enter your guard ID" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn-signin" id="signInBtn" onclick="doLogin()">
      <span class="btn-label" style="display:flex;align-items:center;gap:8px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Sign In
      </span>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="footer-text">University of Southeastern Philippines</div>

  <script>
    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('signInBtn');
      const errorMsg = document.getElementById('errorMsg');

      errorMsg.classList.remove('show');

      if (!username || !password) {
        showError('Please enter your Guard ID and password.');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('backend/guard-auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          // Store guard info in sessionStorage
          sessionStorage.setItem('guard_id', data.guard.id);
          sessionStorage.setItem('guard_name', data.guard.name);
          sessionStorage.setItem('guard_username', data.guard.username);
          window.location.href = 'guard-home.html';
        } else {
          showError(data.message || 'Invalid credentials. Please try again.');
        }
      } catch (err) {
        showError('Connection error. Please check your server.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }
  </script>
</body>
</html>
